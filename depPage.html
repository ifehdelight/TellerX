<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Title</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="page">
    <h3 class="deposit">Deposit</h3>
    <form class="deposit-form" action="" method="get" accept-charset="utf-8">
     
      <div class="number">
        <label for="Amount">Amount</label>
        <input type="number" class="dep-amount" placeholder="Amount" required>
      </div>
      <br />
      <div class="number">
        <label for="Acc-type">Account type</label>
        <select name="account-type" id="account-type" value="account">
          <option value="savings">SAVINGS</option>
          <option value="current">CURRENT</option>
        </select>
      </div>
        <br />
        <div class="number">
          <label for="pin">Enter PIN</label>
          <input type="password" class="inp-pin" placeholder="PIN" inputmode="numeric" maxlength="4" pattern="[0-9]*" required> 
        </div>
        <br>
        <div class="number">
          <label for="c-pin">Confirm PIN</label>
          <input type="password" class="inp-pin retype" placeholder="Confirm PIN" inputmode="numeric" maxlength="4" pattern="[0-9]*" required>
        </div>
        <br>
        <input type="submit" name="" id="" value="DEPOSIT">
        </form>
  </div>
  
  <script src="depPage.js"></script>
</body>

</html>
