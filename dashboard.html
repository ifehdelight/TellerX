<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TellerX - ATM Simulator app</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    .dcontainer {
      background: ghostwhite;
      padding: 20px 20px 150px 20px;
      margin: 0 auto;
      width: 90%;
      max-width: 400px;
      border-bottom-right-radius: 15px;
      border-bottom-left-radius: 15px;
    }
    
    .user-welcome {
      padding-left: 5px;
      font-size: 11px;
      font-weight: 499;
    }
    
    .actions-widgets {
      background: cornflowerblue;
      color: #ffffff;
      padding: 30px 50px;
      border-radius: 10px;
      border: 2px solid #fff8dc;
      display: flex;
      flex-direction: column;
      gap: 5px;
      justify-content: center;
      align-items: flex-start;
      
      position: relative;
      margin-bottom: 50px;
    }
    
    .ava-balance {
      position: absolute;
      left: 20px;
      top: 15px;
      font-size: 12px;
      font-weight: 400;
    }
    
    .others {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      gap: 60px;
    }
    
    .balance {
      font-size: 15px;
      margin-top: 10px;
      margin-left: -30px;
    }
    
    .dep-button {
      background: ghostwhite;
      border: 2px solid #fff8dc;
      border-radius: 10px;
      padding: 5px 10px;
      font-size: 13px;
      font-weight: 500;
      color: gray;
      margin-top: 10px;
      
    }
    
    .other-actions {
      display: flex;
      flex-direction: row;
      gap: 15px;
      background: white;
      padding: 30px 45px;
      justify-content: flex-start;
      /*border: 2px solid gray;*/
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4)
      border-radius: 10px;
    }
    
    .other-actions button {
      padding: 10px 12px;
      border: none;
      border-radius: 12px;
      background: cornflowerblue;
      color: #ffffff;
      
    }
    
    .transfer-btn {
      margin-left: -32px;
    }
  </style>
</head>

<body>
  <div class="dcontainer">
    <h5 class="user-welcome">Welcome,Alice</h5>
    <div class="actions-widgets">
      <p class="ava-balance">Available Balance</p>
      <div class="others">
        <p class="balance">$399.99</p>
        <button class="dep-button">+ Deposit</button>
      </div>
    </div>
    <div class="other-actions">
      <button class="transfer-btn">Transfer</button>
      <button class="withdraw-btn">Withdraw</button>
      <button class="history-btn">History</button>
    </div>
  </div>
</body>

</html>
