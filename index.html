<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TellerX Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <div class="login-card">
      <h1 class="app-name">TellerX ATM</h1>
      <h2 class="login-info">Login</h2>
      <input type="text" class="input-acc" placeholder="Account name" required>
      <input type="password" class="input-pwd" placeholder="Password" required>
      <input type="checkbox" class="show-password" style="transform: translate(-109px, 15px); padding-top: 15px;">
      <label for="show" style="transform: translate(27px, -10px);">Show Password</label>
      <button class="login-btn"type="submit">Login</button>
      <div class="login-status">
        <span class="spinner"></span>
        <span>Logging in...</span>
      </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
