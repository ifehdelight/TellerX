<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TellerX Login</title>
  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
      background-color: ghostwhite;
    }
    
    .container {
      inset: 0;
      position: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    
    .login-card {
      background-color: cornflowerblue;
      padding: 80px 40px;
      max-width: 350px;
      width: 90%;
      border-radius: 15px;
      border: none;
      
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .app-name {
      text-align: center;
      margin-bottom: 4px;
      color: #ffffff;
      font-size: 28px;
    }
    
    .login-info {
      text-align: center;
      color: #fff8dc;
      margin-bottom: 8px;
      font-size: 22px;
      font-weight: 400;
    }
    
    input {
      padding: 10px;
      border: 2px solid transparent;
      border-radius: 8px;
      color: #1a2b4c;
      font-size: 15px;
      transition: border 0.2s;
    }
    
    input:focus {
      outline: none;
      border: 2px solid #fff8dc;
    }
    
    input::placehorder {
      color: #6b7a90;
    }
    
    .input-acc {
      width: 100%;
      margin-top: 15px;
      
    }
    
    .login-btn {
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      font-size: 17px;
      background-color: cornsilk;
      color: cornflowerblue;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
      transition: all 0.2s;
    }
    
    .login-btn:hover {
      background-color: #fff2b2;
      transform: translateY(-1px);
    }
    
    .login-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }
    
    .login-status {
      display: none;
      flex-direction: row;
      gap: 8px;
      justify-content: center;
      align-items: center;
      color: #fff8dc;
      margin-top: 10px;
      font-weight: 600;
    }
    
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 248, 220, 0.3);
      border-top: 2px solid #fff8dc;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(369deg);
      }
    }
    
  </style>
</head>

<body>
  <div class="container">
    <div class="login-card">
      <h1 class="app-name">TellerX ATM</h1>
      <h2 class="login-info">Login</h2>
      <input type="text" class="input-acc" placeholder="Account Number">
      <input type="password" class="input-pwd" placeholder="Password">
      <button class="login-btn"type="submit">Login</button>
      <div class="login-status">
        <span class="spinner"></span>
        <span>Logging in...</span>
      </div>
      </div>
    </div>
  </div>
  <script>
    const loginStatus = document.querySelector('.login-status')
    const loginBtn = document.querySelector('.login-btn')
    
    loginBtn.addEventListener('click', (e) => {
      const acc = document.querySelector('.input-acc').value.trim();
      const pwd = document.querySelector('.input-pwd').value.trim();
      
      if (!acc || !pwd) {
        alert('Enter account number and password')
        return;
      }
      
      loginBtn.disabled = true
      loginStatus.style.display = 'flex'
      
      setTimeout(() => {
        window.location.href = 'dashboard.html'
      }, 3500)
    })
  </script>
</body>

        </html>
